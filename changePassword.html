<!DOCTYPE html>
<html lang="en">
<head>  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password</title>
  <link rel="stylesheet" href="changePassword-style.css">
  </head>

  <body>
    <form id="changePassword" action="/changePassword" method="post">
      <h2>Change Password</h2>
     
       <div class="input-wrapper">
        <input type="password" id="newPass" class="input-field" placeholder="New Password">
        <span class="toggle-eye" onclick="togglePassword('newPass', this)">Show</span>
      </div>


    <div class="input-wrapper">
        <input type="password" id="confirmPass" class="input-field" placeholder="Confirm New Password">
        <span class="toggle-eye" onclick="togglePassword('confirmPass', this)">Show</span>
    </div>

    <div id="error-message" class="message error" style="display:none;"></div>
    <div id="success-message" class="message success" style="display:none;"></div>

<script>
  function togglePassword(fieldId, toggleElement) {
    const field = document.getElementById(fieldId);
    if (field.type === "password") {
      field.type = "text";
      toggleElement.textContent = "Hide";
    } else {
      field.type = "password";
      toggleElement.textContent = "Show";
    }
  }

  function changePassword() {
    const newPassword = document.getElementById('newPass').value;
    const confirmPassword = document.getElementById('confirmPass').value;
    const errorMess = document.getElementById('error-message');
    const successMess = document.getElementById('success-message');

    errorMess.style.display = "none";
    successMess.style.display = "none";
    errorMess.textContent = "";
    successMess.textContent = "";

    // check strength
    if (newPassword.length < 8) {
      errorMess.textContent = "Password must be at least 8 characters long";
      errorMess.style.display = "block";
      return;
    }

    if (newPassword !== confirmPassword) {
      errorMess.textContent = "Passwords do not match";
      errorMess.style.display = "block";
      return;
    }

    successMess.textContent = "Password changed successfully!";
    successMess.style.display = "block";

    setTimeout(function() {
      window.location.href = 'login.html';
    }, 1000);
  }
</script>
   
    <input type="button" value="Change Password" onclick="changePassword()">
  </form>
    </body>

</html>

    </div>
</div>
    <!-- sign-up form-->
    <form id="signup-form" action="/signup" method="post">
      <h2>Sign up</h2>
      <div class="input-wrapper">
        <input type="text" id="FirstName" name="firstname" placeholder="First Name" required>
      </div>

      <div class="input-wrapper">
        <input type="text" id="LastName" name="lastname" placeholder="Last Name" required>
      </div>

      <div class="input-wrapper">
        <input type="email" id="email" name="email" placeholder="Email" required>
      </div>
      <div class="input-wrapper"></div>
        <input type="text" id="phone" name="phone" placeholder="Phone Number" required>
      </div>

      <div class="input-wrapper">
        <input type="date" id="dateOfBirth" name="dateOfBirth" placeholder="Date Of Birth" required>
      </div>

      <div class="input-wrapper">
        <input type="text" id="username" name="username" placeholder="Username" required>
      </div>


      <div class="input-wrapper">
        <input type="password" id="password" name="password" placeholder="Password" required>
        <span class="toggle-eye" onclick="togglePassword('password', this)">Show</span>
      </div>

      <div class="input-wrapper">
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
        <span class="toggle-eye" onclick="togglePassword('confirmPassword', this)">Show</span>
      </div>
      
      
      <input type="submit" value="Sign Up">
      <p>Already have an account? <a class="su" href="login.html">Login here</a></p>
    </form>
    
    </body>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        /* ---------- Show / Hide Password ---------- */
        window.togglePassword = function(fieldId, toggleElement) {
          const field = document.getElementById(fieldId);
          if (!field) return;
      
          if (field.type === "password") {
            field.type = "text";
            toggleElement.textContent = "Hide";
          } else {
            field.type = "password";
            toggleElement.textContent = "Show";
          }
        };
      
        /* ---------- Account Dropdown (navbar) ---------- */
        const accountIcon = document.querySelector('.account-icon');
        const dropdownContent = document.querySelector('.dropdown-content');
        const accountDropdown = document.querySelector('.account-dropdown');
      
        if (accountIcon && dropdownContent && accountDropdown) {
          accountIcon.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownContent.classList.toggle('show');
          });
      
          document.addEventListener('click', (e) => {
            if (!accountDropdown.contains(e.target)) {
              dropdownContent.classList.remove('show');
            }
          });
        }
      
        /* ---------- Sign-up Form + PHP Call ---------- */
        const form = document.getElementById('signup-form');
        if (!form) return;
      
        form.addEventListener('submit', function (event) {
          event.preventDefault(); // Stop normal form submit
      
          const firstname     = document.getElementById('FirstName').value.trim();
          const lastname      = document.getElementById('LastName').value.trim();
          const email         = document.getElementById('email').value.trim();
          const dateOfBirth   = document.getElementById('dateOfBirth').value;
          const username      = document.getElementById('username').value.trim();
          const password      = document.getElementById('password').value;
          const confirmPass   = document.getElementById('confirmPassword').value;
          const phone   = document.getElementById('phone').value;
          // Basic validation
          if (!firstname || !lastname || !email || !dateOfBirth || !username || !password || !confirmPass|| !phone) {
            alert("All fields are required");
            return;
          }
      
          if (password.length < 8) {
            alert("Password must be at least 8 characters long");
            return;
          }
      
          if (password === username) {
            alert("Password cannot be the same as username");
            return;
          }
      
          if (password !== confirmPass) {
            alert("Passwords do not match");
            return;
          }
      
          // Send data to PHP (signup.php), which will store it in the database
          fetch('signup.php', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: new URLSearchParams({
              firstname:   firstname,
              lastname:    lastname,
              email:       email,
              dateOfBirth: dateOfBirth,
              username:    username,
              password:    password,
              phone:       phone   
            })
          })
            .then(response => response.json())
            .then(result => {
              console.log(result);
      
              if (result.status === 'success') {
                alert("Sign-up successful! You can now log in.");
      
                setTimeout(() => {
                  window.location.href = 'login.html';
                }, 1000);
      
              } else {
                // Show error message from PHP
                alert("Sign-up ERROR: " + (result.message || "Unknown error"));
              }
            })
            .catch(error => {
              console.error('Error:', error);
              alert("An error occurred. Please try again later.");
            });
        });
      });
      </script>
      
</body> 
</html>
